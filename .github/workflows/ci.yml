name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    # Kernel >= 6.8 required for full Landlock support used in
    # integration tests (see docs/roadmap.md)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Check kernel prerequisites
        run: ./hack/check-kernel.sh

      - name: Build
        run: go build ./...

      - name: Test (verbose + coverage)
        run: go test -v -coverprofile=coverage.out ./...

      - name: Coverage summary per package/function
        run: go tool cover -func=coverage.out

      - name: Publish coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Vet
        run: go vet ./...

  security:
    # Separate job from build-and-test — see .github/branch_protection:
    # only build-and-test is a required status check for now. Until the
    # first results on real code are triaged, this job blocks no merges;
    # it can be added to the required checks once that's sorted out.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: SAST — gosec
        uses: securego/gosec@9e75c0576c9878035d4221392108d458abe10fc3 # v2.28.0
        with:
          args: ./...

      - name: SCA — Trivy (Go dependencies / go.sum)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          vuln-type: library
