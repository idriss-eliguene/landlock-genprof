# Exemple illustratif du format de sortie attendu (M1/M2).
# Généré (à terme) par : landlock-genprof trace --pod nginx-demo --duration 60s
#
# Format compatible avec le CRD LandlockProfile de PodLock
# (github.com/flavio/podlock).
#
# Les commentaires de confiance ci-dessous illustrent ce que la
# méthodologie de l'Étudiante C doit permettre de communiquer à
# l'utilisateur avant qu'il ne déploie ce profil.

apiVersion: podlock.kubewarden.io/v1alpha1
kind: LandlockProfile
metadata:
  name: nginx-demo
  namespace: default
spec:
  profilesByContainer:
    nginx:
      "/usr/sbin/nginx":
        readExec:
          - /lib
          - /lib64
        readOnly:
          - /usr/share/nginx        # confiance: high — vu à chaque run
        readWrite:
          - /tmp                    # confiance: high — vu à chaque run
          - /var/cache/nginx/proxy  # confiance: low — vu 1 fois sur 5 runs,
                                    # à vérifier avant déploiement en prod
