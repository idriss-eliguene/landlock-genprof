# Illustrative example of the expected output format (M1/M2).
# Generated (eventually) by: landlock-genprof trace --pod nginx-demo --duration 60s
#
# Format compatible with PodLock's LandlockProfile CRD
# (github.com/flavio/podlock).
#
# The confidence comments below illustrate what Student C's methodology
# should be able to communicate to the user before they deploy this profile.

apiVersion: podlock.kubewarden.io/v1alpha1
kind: LandlockProfile
metadata:
  name: nginx-demo
  namespace: default
spec:
  profilesByContainer:
    nginx:
      "/usr/sbin/nginx":
        readExec:
          - /lib
          - /lib64
        readOnly:
          - /usr/share/nginx        # confidence: high — seen on every run
        readWrite:
          - /tmp                    # confidence: high — seen on every run
          - /var/cache/nginx/proxy  # confidence: low — seen once out of 5 runs,
                                    # verify before deploying to prod
