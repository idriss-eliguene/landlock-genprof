# Illustrative example, adapted from docs/usage.md Step 4undecies's documented
# sample output — not a fresh live capture. Shape and field names are
# confirmed against SPO's own Go source (see docs/usage.md's Step 4undecies);
# see issue #94 for regenerating this from a real trace run.
#
# Would be generated by:
#   go run ./cmd/landlock-genprof trace --pod nginx-demo --namespace default \
#     --binary /usr/sbin/nginx --duration 60s --seccomp-profile-out nginx-demo-seccompprofile.yaml
#
# Requires security-profiles-operator actually installed to take effect
# once applied — see docs/enforcement-prerequisites.md.

apiVersion: security-profiles-operator.x-k8s.io/v1
kind: SeccompProfile
metadata:
  name: nginx-demo
  namespace: default
spec:
  defaultAction: SCMP_ACT_ERRNO
  architectures: [SCMP_ARCH_X86_64]
  syscalls:
    - names: [accept4, epoll_wait, openat, read, write]
      action: SCMP_ACT_ALLOW
