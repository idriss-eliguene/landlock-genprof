# Illustrative example, adapted from README.md Step 4septies's documented
# sample output — not a fresh live capture. See issue #94 for
# regenerating this from a real trace run.
#
# Would be generated by:
#   go run ./cmd/landlock-genprof trace --pod nginx-demo --namespace default \
#     --binary /usr/sbin/nginx --duration 60s --security-context-out nginx-demo-securitycontext.yaml
#
# Composed from the same capabilities data as capabilities.yaml plus a
# reference to the seccomp profile — not a merge of seccomp.json itself,
# see README Step 4septies for why. Deliberately does not infer
# privileged/runAsNonRoot/readOnlyRootFilesystem/runAsUser: nothing here
# observes any of them.

capabilities:
  add:
    - NET_BIND_SERVICE   # confidence: high
  drop:
    - ALL
seccompProfile:
  type: Localhost
  localhostProfile: operator/nginx-demo.json
