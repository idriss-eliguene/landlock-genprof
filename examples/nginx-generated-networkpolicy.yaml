# Illustrative example, adapted from README.md Step 4bis's documented
# sample output — not a fresh live capture (unlike
# nginx-generated-profile.yaml, which is real M4 output). Shape and
# field names are accurate; see issue #94 for regenerating this from a
# real trace run once someone picks it up.
#
# Would be generated by:
#   go run ./cmd/landlock-genprof trace --pod nginx-demo --namespace default \
#     --binary /usr/sbin/nginx --duration 60s --network-out nginx-demo-networkpolicy.yaml

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-demo
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: nginx        # copied from the traced pod's own labels
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443      # confidence: high
